<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Barn Betting Inc.</title>
  <meta name="description" content="World Cup match predictions and US-sports model picks — ranked by how likely each call is to hit." />
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
  <header class="header">
    <div class="wrap">
      <h1>Barn Betting <span class="accent">Inc.</span></h1>
      <nav class="nav" aria-label="Pages">
        <a class="nav-link" href="index.html" aria-current="page">Picks</a>
        <a class="nav-link" href="groups.html">Groups</a>
        <a class="nav-link" href="injuries.html">Injuries</a>
        <a class="nav-link" href="record.html">Record</a>
      </nav>
      <p id="updated" class="updated"></p>
    </div>
  </header>

  <!-- Track record: a permanent scrolling ticker of the W-L per bet category -->
  <div class="ticker" aria-label="Track record by bet type">
    <span class="ticker-label" aria-hidden="true"><span class="rec-dot"></span>Record</span>
    <div class="ticker-viewport">
      <div id="recordTicker" class="ticker-track"></div>
    </div>
  </div>

  <main class="wrap page">
    <!-- World Cup predictions -->
    <section class="block">
      <h2 class="block-title">⚽ World Cup — predictions</h2>
      <div id="wcPredictions" class="stack" aria-live="polite"></div>
    </section>

    <!-- US-sports predictions -->
    <section class="block">
      <h2 class="block-title">🏀 US sports — predictions</h2>
      <div id="usPredictions" class="stack" aria-live="polite"></div>
    </section>
  </main>

  <footer class="footer wrap">
    <p>See how the picks have done on the <a href="record.html">record</a>.</p>
    <p class="fine">Not financial advice. 21+. If gambling is a problem, call 1-800-GAMBLER.</p>
  </footer>

  <script src="common.js"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
