<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Best Bets · Hard Rock</title>
  <meta name="description" content="Daily +EV best bets at Hard Rock Bet vs the sharp market." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="wrap">
      <h1>Best Bets <span class="accent">· Hard Rock</span></h1>
      <p class="tagline">Where Hard Rock is paying more than the bet is worth — ranked by edge.</p>
      <div id="trackRecord" class="track-record" aria-live="polite"></div>
      <p id="updated" class="updated"></p>
    </div>
  </header>

  <nav id="filters" class="filters wrap" aria-label="Filter by sport"></nav>

  <main id="bets" class="bets wrap" aria-live="polite"></main>

  <footer class="footer wrap">
    <p id="disclaimer"></p>
    <p class="fine">This is not financial advice. 21+. If gambling is a problem, call 1-800-GAMBLER.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
