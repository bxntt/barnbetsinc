# ----------------------------------------------------------------------------
# Hard Rock Bet "Best Bets" edge finder — configuration
# ----------------------------------------------------------------------------

# Which odds provider to use: mock | odds_api_io | the_odds_api
# `mock` needs no API key and ships with a planted +EV bet so the whole
# pipeline + website run out of the box.
provider: the_odds_api

# The book we can actually bet at (Florida). The engine evaluates *this* book's
# prices against the sharp/consensus fair line.
target_book: hardrockbet

# Books treated as the "sharp" reference, in priority order. The first one
# present in a market is used to compute the no-vig fair line; if none are
# present we fall back to a consensus de-vig across all available books.
sharp_books:
  - pinnacle
  - circa
  - betonlineag

# Sports to pull. Keys are the canonical sport keys used by the providers
# (The Odds API style). The mock provider ignores this list.
sports:
  - americanfootball_nfl
  - basketball_nba
  - baseball_mlb
  - icehockey_nhl
  - americanfootball_ncaaf
  - basketball_ncaab

# Markets to evaluate.
markets:
  - h2h        # moneyline
  - spreads
  - totals

# The Odds API regions to request. "us" includes Hard Rock; add "eu" to include
# Pinnacle (the best sharp reference). Cost on The Odds API = markets x regions
# per sport per call, so "us,eu" with 3 markets = 6 credits/sport/call.
# Kept at "us" to protect the free-tier budget (Circa + BetOnline as sharp refs);
# add "eu" for Pinnacle if you upgrade the plan.
the_odds_api_regions: us

# Hard Rock engine is LOWER priority than the World Cup on the free tier. With a
# live provider it runs at most once per this many hours (~3 credits/run for MLB).
engine_min_interval_hours: 24
engine_credit_reserve: 20

# ----- Strategy thresholds -----
# Minimum edge (in %) for a bet to be recommended. 2.0 = +2% EV.
min_ev_pct: 2.0

# Confidence weighting. Markets with a wider sharp price (more vig / more
# disagreement) are less trustworthy and get down-weighted.
confidence:
  # Vig above this (as a fraction, e.g. 0.06 = 6% hold) is treated as a wide,
  # low-trust market and heavily discounted.
  max_trusted_vig: 0.06
  # Recommendations within this many minutes of kickoff are down-weighted
  # (late info, stale comparisons).
  min_minutes_to_start: 30

# ----- Value engine (de-vig accuracy, guardrails, sizing, model) -----
strategy:
  # De-vig method used to turn reference prices into fair probabilities.
  # power (default) corrects favorite-longshot bias without overcorrecting;
  # shin corrects it most aggressively; multiplicative is the simple baseline.
  devig_method: power
  # Weighted consensus: sharper books count more when no single sharp book is present.
  book_weights:
    pinnacle: 3.0
    circa: 3.0
    betonlineag: 2.0
  # Price Hard Rock's alternate spread/total lines off the nearest sharp line
  # (Normal model), reach-limited and confidence-penalized.
  interpolate: true
  interp_max_reach: 2.0       # never shift a line more than this many points
  interp_conf_penalty: 0.5    # confidence cut at full reach (0..1)
  # Favorite-longshot guardrail: discount value found on heavy underdogs, where
  # book vig is heaviest and multiplicative de-vig overstates the fair price.
  longshot_prob: 0.30         # fair prob below this is treated as a longshot
  longshot_penalty: 0.5       # confidence floor for extreme longshots
  # De-vig method disagreement beyond this fully discounts confidence.
  method_spread_tol: 0.04
  # Fractional-Kelly stake sizing (shown per bet; quarter-Kelly, hard-capped).
  kelly_fraction: 0.25
  kelly_cap: 0.05             # max suggested stake as a fraction of bankroll
  # Independent Elo cross-check (flags moneyline bets where a model disagrees).
  model_enabled: true
  model_disagree: 0.10        # |model - market| beyond this is flagged
  model_min_games: 30         # min graded games before Elo is trusted
  # Probability calibration loop (predicted vs realized hit rate from results).
  calibration_enabled: true

# How many best bets to publish to the site (overall). 0 = unlimited.
max_published: 50

# ----- Context enrichment (free, no key) -----
context:
  injuries: true     # ESPN unofficial endpoints
  weather: false     # Open-Meteo, for outdoor-sport totals (off by default)

# ----------------------------------------------------------------------------
# World Cup predictor — MODEL-DRIVEN (separate from the Hard Rock engine).
# For each game we predict what will happen across every bet type (result,
# total, both-teams-to-score, handicap) from team strength + live form, blended
# with market consensus when odds are available. Output -> site/worldcup.json.
# ----------------------------------------------------------------------------
worldcup:
  enabled: true
  # mock = bundled 12-group 2026 field (no key; powers predictor + simulator).
  # the_odds_api = live schedule (free /events) tagged to the real 2026 draw via
  # agent/worldcup/fixtures.py; ratings live in agent/worldcup/ratings.py. Paid
  # odds polls only sharpen the prediction blend — they never gate publishing.
  provider: the_odds_api
  competition: soccer_fifa_world_cup   # The Odds API sport key (real provider)
  markets:
    - h2h        # 1X2: home / draw / away (sharpens the result + derived calls)
    - totals     # match goals over/under
  regions: us                          # us-only: cheapest; predictions are free regardless
  max_published: 60                    # cap on games shown (all 4 market calls per game kept)
  sims: 20000                          # Monte Carlo group-stage simulations
  seed: 42                             # deterministic output (stable site diffs)
  # Injuries page (site/injuries.json): who was expected to play but is out, by
  # game. Sourced from the hand-maintained snapshot in agent/worldcup/injuries.py.
  # Set true to also pull ESPN's free live data (no key); off keeps it budget-safe.
  injuries_espn: false

  # ----- Live-polling budget guard (free-tier safe) -----
  # A paid odds poll happens ONLY inside a match window AND within a rolling daily
  # credit cap = (remaining - credit_reserve) / days_until(tournament_end). The
  # free /events endpoint provides both the schedule and the live credit balance,
  # so most cron ticks cost 0. Overrun is mathematically impossible.
  pre_kickoff_min: 60      # begin polling 60 min before kickoff
  post_kickoff_min: 150    # keep polling until ~150 min after kickoff (match end)
  min_interval_min: 15     # never poll more than once per 15 min
  credit_reserve: 20       # never spend below this many remaining credits
  tournament_end: "2026-07-19"   # spread the remaining credits through the final
