name: Update best bets & deploy

# Refreshes site/data.json on a schedule and deploys the site to GitHub Pages.
# The default `mock` provider needs no secrets, so this works the moment Pages
# is enabled. For real data, set `provider` in config.yaml and add the matching
# API key as a repository secret (THE_ODDS_API_KEY or ODDS_API_IO_KEY).

on:
  workflow_dispatch:          # run manually from the Actions tab
  schedule:
    # Every 3 hours. Tighten/loosen to match your API's free-tier budget.
    - cron: "0 */3 * * *"

permissions:
  contents: write             # commit history snapshots back (for movement + CLV)
  pages: write
  id-token: write

concurrency:
  group: best-bets
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run the agent
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          ODDS_API_IO_KEY: ${{ secrets.ODDS_API_IO_KEY }}
        run: python -m agent.pipeline

      - name: Persist history (for line movement & CLV)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history site/data.json
          git commit -m "chore: refresh best bets [skip ci]" || echo "nothing to commit"
          git push || echo "nothing to push"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
