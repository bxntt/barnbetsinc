name: Update predictions & deploy

# Refreshes site/data.json on a schedule and deploys the site to GitHub Pages.
# The default `mock` provider needs no secrets, so this works the moment Pages
# is enabled. For real data, set `provider` in config.yaml and add the matching
# API key as a repository secret (THE_ODDS_API_KEY or ODDS_API_IO_KEY).

on:
  workflow_dispatch:          # run manually from the Actions tab
  schedule:
    # Every 15 min so the World Cup tab stays fresh during matches. Most ticks
    # cost 0 credits: the agent's free /events gate only pays for an odds poll
    # inside a match window and within its rolling daily budget cap.
    - cron: "*/15 * * * *"

permissions:
  contents: write             # commit history snapshots back (for calibration grading)
  pages: write
  id-token: write

concurrency:
  group: predictions
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run the agent
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          ODDS_API_IO_KEY: ${{ secrets.ODDS_API_IO_KEY }}
        run: python -m agent.pipeline

      # Most cron ticks change nothing (no match in window). Only commit + deploy
      # when site/data actually moved, so we don't spam commits or Pages builds.
      - name: Detect changes
        id: changes
        run: |
          git add -A data/history site
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes this tick — skipping commit & deploy."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Persist history (for calibration grading)
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh predictions [skip ci]"
          git push

      # Deploy when data changed, or on any manual run (so the first deploy and
      # any forced refresh always publish, even on a no-change tick).
      - if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5
      - if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/deploy-pages@v4
